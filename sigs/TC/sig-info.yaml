meeting_agenda:
  - "1、讨论和规划社区技术发展方向与愿景。"
  - "2、讨论和决策社区重大技术事项。"
  - "3、决策SIG组的建立和撤销，审视和辅导SIG组日常工作，协调SIG组间技术合作。"
meeting_agenda_en:
  - "1. Define and steer the community's technical roadmap and long-term vision."
  - "2. Deliberate and make final decisions on the community's major technical initiatives."
  - "3. Oversee the lifecycle of Special Interest Groups (SIGs), including their formation and retirement. Provide governance, daily guidance to SIGs, and facilitate cross-SIG technical collaboration. "